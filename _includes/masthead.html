<style>
  html, body, #main, .page,
.initial-content, .layout--single,
.page__inner-wrap, .page__content,
.sidebar.sticky {
  background-color: #0d1520 !important;
  color: #e2e8f0 !important;
}
p, li { color: #e2e8f0 !important; }
h1, h2, h3, h4 { color: #2ce8c8 !important; }
a { color: #2ce8c8 !important; }
table { background: #111d2e !important; }
td, th { color: #e2e8f0 !important; }
.page__footer { background: #0a1020 !important; }
  .masthead,
  .masthead__inner-wrap,
  #site-nav,
  .greedy-nav {
    background-color: #1a1a2e !important;
    border-bottom: 2px solid #4dccc0 !important;
  }
  .site-title,
  .site-subtitle {
    color: #4dccc0 !important;
  }
  .greedy-nav a,
  .greedy-nav button {
    color: #e0e0e0 !important;
    background: transparent !important;
  }
  .greedy-nav a:hover {
    color: #4dccc0 !important;
  }

</style>




{% include base_path %}
<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button><span class="navicon"></span></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg persist {% if page.url == '/' or page.url == '/index.html' %}selected{% endif %}">
            <a href="{{ base_path }}/">{{ site.title }}</a>
          </li>
          {% for link in site.data.navigation.main %}
            {% if link.url contains 'http' %}
              {% assign domain = '' %}
            {% else %}
              {% assign domain = base_path %}
            {% endif %}
            <li class="masthead__menu-item {% if page.url contains link.url and link.url != '/' %}selected{% endif %}">
              <a href="{{ domain }}{{ link.url }}">{{ link.title }}</a>
            </li>
          {% endfor %}
          <li id="theme-toggle" class="masthead__menu-item persist tail">
            <a role="button" aria-labelledby="theme-icon"><i id="theme-icon" class="fa-solid fa-sun" aria-hidden="true" title="toggle theme"></i></a>
          </li>
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
